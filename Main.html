<!DOCTYPE html>
<html>
<head>
  <title></title>
  <style>
      body {
        margin: 0;
        height: 100vh;
        background-image: url('wallpaper1.png');
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
      }
  </style>
</head>

<body onclick="playSound()">
  <audio id="sound" src="boom2.mp3" loop></audio>

  <script>
    function playSound() {
      const audio = document.getElementById('sound');
      audio.volume = 1; // max loudness
      audio.play();
    }
  </script>
</body>
</html>
